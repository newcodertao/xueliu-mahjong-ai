app:
  name: xueliu-mahjong-ai
  data_dir: data
  dataset_dir: datasets/xueliu_tiles_v1
  log_dir: data/games

capture:
  monitor: 1
  interval_seconds: 0.5
  save_fullscreen: true
  save_rois: true

vision:
  confidence_threshold: 0.60
  iou_threshold: 0.50
  stable_frames: 2

recommendation_readiness:
  minimum_core_score: 90
  table_aware_context_score: 50
  enhanced_context_score: 80
  max_safe_inferred_hand_tiles: 1
  minimum_safe_inferred_confidence: 0.40
